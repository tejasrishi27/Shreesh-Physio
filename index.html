<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shreesh Physio Clinic - Evidence-Based Rehabilitation</title>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel CDN for JSX Parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clinicalDark: '#0F172A',
                        clinicalBlue: '#0284C7',
                        clinicalGreen: '#10B981',
                        clinicalSlate: '#64748B',
                        clinicalLight: '#F0F9FF'
                    },
                    animation: {
                        fadeIn: 'fadeIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(4px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F8FAFC] font-sans antialiased text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // Delivery Mode & Specializations State
            const [selectedDeliveryMode, setSelectedDeliveryMode] = React.useState('In-Clinic');
            const [selectedSpecialty, setSelectedSpecialty] = React.useState('');
            const [selectedSlot, setSelectedSlot] = React.useState('');
            const [bookingStep, setBookingStep] = React.useState(1);
            
            // Patient Fields State
            const [patientName, setPatientName] = React.useState('');
            const [patientPhone, setPatientPhone] = React.useState('');
            const [patientEmail, setPatientEmail] = React.useState('');

            // Component Visibility State
            const [activeFaq, setActiveFaq] = React.useState(null);
            const [showPortalModal, setShowPortalModal] = React.useState(false);
            const [showSuccessModal, setShowSuccessModal] = React.useState(false);

            // Portal Login Input State
            const [portalEmail, setPortalEmail] = React.useState('');
            const [portalPassword, setPortalPassword] = React.useState('');
            const [portalError, setPortalError] = React.useState('');

            // Hardcoded Clinical Data Arrays
            const specialties = [
                { id: 'ortho', title: 'Orthopedic Rehabilitation', description: 'Post-operative TKR/THR mobilization framework, chronic knee pathology, osteoarthritic care, and structural joint realignment strategies.', icon: '🦴' },
                { id: 'neuro', title: 'Neurological Recovery', description: 'Targeted sensorimotor retraining paths, neuroplasticity acceleration for post-stroke hemiplegia, and balance system regulation.', icon: '🧠' },
                { id: 'spine', title: 'Spinal Decompression Care', description: 'Advanced mechanical decompression, core muscular recalibration for disc herniation, sciatica, and chronic lumbar strain.', icon: '🧬' },
                { id: 'sports', title: 'Sports Tissue Load Progression', description: 'Biomechanical optimization, progressive loading for kinetic ligament tears (ACL/MCL), rotator cuff repairs, and speed return protocols.', icon: '🏃‍♂️' }
            ];

            const timeSlots = [
                '10:00 AM - 11:00 AM',
                '11:00 AM - 12:00 PM',
                '12:00 PM - 01:00 PM',
                '06:00 PM - 07:00 PM',
                '07:00 PM - 08:00 PM',
                '08:00 PM - 09:00 PM'
            ];

            const metrics = [
                { val: '15,000+', label: 'Recovered Patients' },
                { val: '98.6%', label: 'Clinical Efficacy Rate' },
                { val: '12+ Yrs', label: 'Practicing Excellence' },
                { val: '2026', label: 'Tech Upgraded Setup' }
            ];

            const testimonials = [
                { name: 'Rajesh Kumar', relation: 'Post-TKR Rehabilitation', rating: 5, text: 'The structural approach to my post-knee replacement therapy allowed full mobility return within 6 weeks. Exceptionally professional setup.' },
                { name: 'Priyanka Reddy', relation: 'Chronic Lumbar Recovery', rating: 5, text: 'Suffered from severe disc bulge symptoms for 2 years. Their targeted core restoration plan resolved my radicular nerve pain completely.' },
                { name: 'Anand Sharma', relation: 'Sports Injury Path', rating: 5, text: 'Recovered safely from an absolute Grade-II ankle sprain under their advanced progressive tissue load scheduling guidelines.' },
                { name: 'Sunitha V.', relation: 'Neurological Balance Care', rating: 5, text: 'Excellent specialized stroke therapy path. The balance retraining strategies systematically restored independent gait confidence.' }
            ];

            const faqs = [
                { q: 'What should I present at my baseline diagnostic evaluation?', a: 'Please ensure all relevant medical records, historical imaging metrics (MRI, X-Rays), and surgical referral summaries are provided during initial system intake.' },
                { q: 'How are clinical sessions arranged across delivery paths?', a: 'Patients can choose either In-Clinic consultations utilizing specialized hardware infrastructure or scheduled Home Care visits for specific post-operative conditions.' },
                { q: 'What is your standard cancellation policy structure?', a: 'Appointments can be modified or canceled up to 2 hours before your scheduled time window without incurring administrative adjustments.' }
            ];

            // Action Handlers
            const handleBookingSubmit = (e) => {
                e.preventDefault();
                if (!patientName || !patientPhone) return;
                setShowSuccessModal(true);
            };

            const handlePortalLogin = (e) => {
                e.preventDefault();
                if (!portalEmail.includes('@') || portalPassword.length < 6) {
                    setPortalError('Invalid identification parameter credentials.');
                } else {
                    setPortalError('');
                    alert('Portal Access granted successfully.');
                    setShowPortalModal(false);
                }
            };

            const resetBooking = () => {
                setBookingStep(1);
                setSelectedSpecialty('');
                setSelectedSlot('');
                setPatientName('');
                setPatientPhone('');
                setPatientEmail('');
                setShowSuccessModal(false);
            };

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    
                    {/* 1. Global Navigation Bar Header */}
                    <nav className="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <span className="text-xl font-black tracking-tight text-clinicalDark flex items-center">
                                    <span className="text-clinicalBlue mr-1">✦</span>Shreesh Physio
                                </span>
                            </div>
                            <div className="hidden md:flex items-center gap-8 text-xs font-bold text-clinicalSlate uppercase tracking-wider">
                                <a href="#specialties" className="hover:text-clinicalBlue transition">Specialties</a>
                                <a href="#booking" className="hover:text-clinicalBlue transition">Booking System</a>
                                <a href="#testimonials" className="hover:text-clinicalBlue transition">Clinical Outcomes</a>
                                <a href="#faqs" className="hover:text-clinicalBlue transition">Support Matrix</a>
                            </div>
                            <button 
                                onClick={() => setShowPortalModal(true)}
                                className="border border-clinicalDark text-clinicalDark hover:bg-clinicalDark hover:text-white text-xs font-bold px-4 py-2 rounded-xl transition"
                            >
                                Patient Portal Login
                            </button>
                        </div>
                    </nav>

                    {/* 2. Hero Presentation Section */}
                    <section className="bg-gradient-to-b from-clinicalLight via-white to-[#F8FAFC] py-20 px-4 border-b border-gray-50">
                        <div className="max-w-5xl mx-auto text-center space-y-6">
                            <span className="inline-block text-xs font-bold tracking-widest text-clinicalBlue bg-clinicalBlue/10 px-4 py-1.5 rounded-full uppercase">
                                Advanced Physiotherapeutic Infrastructure
                            </span>
                            <h1 className="text-4xl md:text-6xl font-black text-clinicalDark tracking-tight max-w-4xl mx-auto leading-[1.1]">
                                Science-Backed Physical Rehabilitation & Recovery
                            </h1>
                            <p className="text-sm md:text-base text-clinicalSlate max-w-2xl mx-auto leading-relaxed">
                                Personalized anatomical evaluation matrix configured with clinical exercise prescription paths to effectively overcome chronic pain, physical injury, and surgical recovery restrictions.
                            </p>
                            <div className="pt-4 flex flex-col sm:flex-row justify-center items-center gap-4">
                                <a href="#booking" className="w-full sm:w-auto bg-clinicalBlue text-white font-bold text-sm px-8 py-4 rounded-2xl shadow-lg shadow-clinicalBlue/20 hover:bg-clinicalBlue/90 transition text-center">
                                    Schedule Immediate Clinical Intake
                                </a>
                                <a href="#specialties" className="w-full sm:w-auto bg-white border border-gray-200 text-clinicalDark font-bold text-sm px-8 py-4 rounded-2xl hover:border-gray-300 transition text-center">
                                    Review Diagnostic Specializations
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* 3. Operational Performance Indicators */}
                    <section className="py-12 bg-white border-b border-gray-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                {metrics.map((m, idx) => (
                                    <div key={idx} className="p-6 text-center bg-[#F8FAFC] rounded-2xl border border-gray-50">
                                        <div className="text-2xl md:text-3xl font-black text-clinicalDark">{m.val}</div>
                                        <div className="text-[11px] font-bold text-clinicalSlate uppercase tracking-wider mt-1">{m.label}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 4. Modality Selection & Medical Specialties Grid */}
                    <section id="specialties" className="py-20 bg-[#F8FAFC]">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center max-w-2xl mx-auto mb-16 space-y-3">
                                <h2 className="text-2xl md:text-3xl font-extrabold text-clinicalDark">Configured Treatment Tracks</h2>
                                <p className="text-xs text-clinicalSlate">Select your delivery strategy environment preferences below.</p>
                                
                                {/* Delivery Mode Switcher */}
                                <div className="inline-flex p-1 bg-white border border-gray-200 rounded-xl mt-4">
                                    {['In-Clinic', 'Home Care'].map((mode) => (
                                        <button
                                            key={mode}
                                            onClick={() => setSelectedDeliveryMode(mode)}
                                            className={`px-6 py-2 rounded-lg text-xs font-bold transition ${selectedDeliveryMode === mode ? 'bg-clinicalDark text-white shadow-sm' : 'text-clinicalSlate hover:text-clinicalDark'}`}
                                        >
                                            {mode} Environment
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {specialties.map((spec) => (
                                    <div key={spec.id} className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex gap-4 items-start transition hover:shadow-md">
                                        <div className="w-12 h-12 rounded-xl bg-clinicalLight flex items-center justify-center text-xl flex-shrink-0">
                                            {spec.icon}
                                        </div>
                                        <div className="space-y-1">
                                            <h3 className="text-base font-bold text-clinicalDark">{spec.title}</h3>
                                            <p className="text-xs text-clinicalSlate leading-relaxed">{spec.description}</p>
                                            <a href="#booking" onClick={() => setSelectedSpecialty(spec.title)} className="inline-block text-[11px] font-bold text-clinicalBlue hover:underline pt-2">
                                                Initialize this path &rarr;
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 5. Interactive Patient Booking Engine */}
                    <section id="booking" className="py-20 bg-white">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden">
                                
                                {/* Header / Steps Progress */}
                                <div className="bg-clinicalDark text-white p-6 md:p-8">
                                    <div className="flex justify-between items-center mb-6">
                                        <div>
                                            <h3 className="text-xl font-bold">Clinical Appointment Booking</h3>
                                            <p className="text-xs text-blue-200 mt-1">Direct scheduling under evidence-based assessment paths.</p>
                                        </div>
                                        <span className="bg-clinicalBlue text-white text-xs font-bold px-3 py-1 rounded-full">
                                            Step {bookingStep} of 2
                                        </span>
                                    </div>
                                    
                                    {/* Progress Bar Indicator */}
                                    <div className="w-full bg-white/10 h-1.5 rounded-full overflow-hidden">
                                        <div 
                                            className="bg-clinicalGreen h-full transition-all duration-300" 
                                            style={{ width: bookingStep === 1 ? '50%' : '100%' }}
                                        />
                                    </div>
                                </div>

                                {/* Form Container */}
                                <form onSubmit={handleBookingSubmit} className="p-6 md:p-8">
                                    
                                    {/* STEP 1: Specialization & Scheduling */}
                                    {bookingStep === 1 && (
                                        <div className="space-y-6 animate-fadeIn">
                                            <div>
                                                <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-2">
                                                    1. Select Pathology / Specialty <span className="text-red-500">*</span>
                                                </label>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                    {specialties.map((spec) => (
                                                        <div 
                                                            key={spec.id}
                                                            onClick={() => setSelectedSpecialty(spec.title)}
                                                            className={`p-4 rounded-xl border text-left cursor-pointer transition flex items-start gap-3 ${selectedSpecialty === spec.title ? 'border-clinicalBlue bg-clinicalLight/50 ring-2 ring-clinicalBlue/20' : 'border-gray-200 hover:border-gray-300'}`}
                                                        >
                                                            <div className="mt-0.5 text-clinicalBlue flex-shrink-0">{spec.icon}</div>
                                                            <div>
                                                                <h4 className="text-sm font-bold text-clinicalDark">{spec.title}</h4>
                                                                <p className="text-[11px] text-clinicalSlate mt-0.5 line-clamp-2">{spec.description}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-2">
                                                    2. Select Available Hourly Slot <span className="text-red-500">*</span>
                                                </label>
                                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                                    {timeSlots.map((slot) => (
                                                        <button
                                                            key={slot}
                                                            type="button"
                                                            onClick={() => setSelectedSlot(slot)}
                                                            className={`p-3 rounded-lg border text-xs font-semibold text-center transition ${selectedSlot === slot ? 'bg-clinicalBlue border-clinicalBlue text-white shadow-sm' : 'border-gray-200 text-clinicalDark hover:bg-gray-50'}`}
                                                        >
                                                            {slot}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="pt-4 border-t border-gray-100 flex justify-end">
                                                <button
                                                    type="button"
                                                    disabled={!selectedSpecialty || !selectedSlot}
                                                    onClick={() => setBookingStep(2)}
                                                    className="w-full sm:w-auto bg-clinicalBlue text-white disabled:opacity-50 text-sm font-bold px-6 py-3 rounded-xl shadow transition min-h-[48px]"
                                                >
                                                    Continue to Patient Details &rarr;
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {/* STEP 2: Patient Personal Validation Information */}
                                    {bookingStep === 2 && (
                                        <div className="space-y-6 animate-fadeIn">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-1.5">
                                                        Full Patient Name <span className="text-red-500">*</span>
                                                    </label>
                                                    <input 
                                                        type="text" 
                                                        required
                                                        placeholder="e.g., Siripuram Rakesh" 
                                                        value={patientName}
                                                        onChange={(e) => setPatientName(e.target.value)}
                                                        className="w-full text-sm border border-gray-200 rounded-xl p-3 focus:outline-none focus:border-clinicalBlue focus:ring-2 focus:ring-clinicalBlue/10 transition"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-1.5">
                                                        Contact Number <span className="text-red-500">*</span>
                                                    </label>
                                                    <input 
                                                        type="tel" 
                                                        required
                                                        placeholder="10-digit mobile number" 
                                                        value={patientPhone}
                                                        onChange={(e) => setPatientPhone(e.target.value)}
                                                        className="w-full text-sm border border-gray-200 rounded-xl p-3 focus:outline-none focus:border-clinicalBlue focus:ring-2 focus:ring-clinicalBlue/10 transition"
                                                    />
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-1.5">
                                                    Email Address <span className="text-clinicalSlate">(Optional)</span>
                                                </label>
                                                <input 
                                                    type="email" 
                                                    placeholder="patient@example.com" 
                                                    value={patientEmail}
                                                    onChange={(e) => setPatientEmail(e.target.value)}
                                                    className="w-full text-sm border border-gray-200 rounded-xl p-3 focus:outline-none focus:border-clinicalBlue focus:ring-2 focus:ring-clinicalBlue/10 transition"
                                                />
                                            </div>

                                            {/* Treatment Selection Summary Review Card */}
                                            <div className="bg-clinicalLight border border-blue-100 rounded-2xl p-4 text-xs space-y-2">
                                                <h4 className="font-bold text-clinicalDark text-sm mb-1">Appointment Summary Review</h4>
                                                <div className="flex justify-between"><span className="text-clinicalSlate">Selected Care Modality:</span> <strong className="text-clinicalDark">{selectedDeliveryMode} Care</strong></div>
                                                <div className="flex justify-between"><span className="text-clinicalSlate">Clinical Specialty Focus:</span> <strong className="text-clinicalDark">{selectedSpecialty}</strong></div>
                                                <div className="flex justify-between"><span className="text-clinicalSlate">Allocated Timeframe:</span> <strong className="text-clinicalBlue">{selectedSlot}</strong></div>
                                            </div>

                                            <div className="pt-4 border-t border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-3">
                                                <button
                                                    type="button"
                                                    onClick={() => setBookingStep(1)}
                                                    className="w-full sm:w-auto text-xs font-bold text-[#475569] hover:text-clinicalDark p-2 text-center"
                                                >
                                                    &larr; Adjust Slot Preferences
                                                </button>
                                                <button
                                                    type="submit"
                                                    className="w-full sm:w-auto bg-[#10B981] text-white font-bold text-sm px-8 py-3 rounded-xl shadow-md hover:shadow-lg transition min-h-[48px]"
                                                >
                                                    Confirm and Book Session
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                </form>
                            </div>
                        </div>
                    </section>

                    {/* 6. Patient Feedback / Testimonials */}
                    <section id="testimonials" className="py-20 bg-[#F8FAFC] border-y border-gray-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center max-w-2xl mx-auto mb-16">
                                <span className="text-xs font-bold text-clinicalBlue uppercase tracking-wider bg-clinicalLight px-3.5 py-1.5 rounded-full">Patient Outcomes</span>
                                <h2 className="text-3xl font-extrabold text-clinicalDark mt-4">Verified Recoveries</h2>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {testimonials.map((t, idx) => (
                                    <div key={idx} className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex flex-col justify-between">
                                        <div>
                                            <div className="flex text-yellow-400 mb-3">
                                                {[...Array(t.rating)].map((_, i) => (
                                                    <svg key={i} className="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                                ))}
                                            </div>
                                            <p className="text-xs md:text-sm text-clinicalDark leading-relaxed italic">"{t.text}"</p>
                                        </div>
                                        <div className="mt-4 pt-4 border-t border-gray-50">
                                            <h4 className="text-xs font-bold text-clinicalDark">{t.name}</h4>
                                            <span className="text-[10px] text-clinicalSlate font-medium">{t.relation}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 7. Clinical Support FAQs */}
                    <section id="faqs" className="py-20 bg-white">
                        <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-12">
                                <h2 className="text-2xl md:text-3xl font-extrabold text-clinicalDark">Frequently Asked Questions</h2>
                                <p className="text-xs text-clinicalSlate mt-1">Key parameters regarding session rules and standard operational frameworks.</p>
                            </div>

                            <div className="space-y-3">
                                {faqs.map((faq, idx) => (
                                    <div key={idx} className="border border-gray-100 rounded-xl overflow-hidden bg-[#F8FAFC]">
                                        <button 
                                            type="button"
                                            onClick={() => setActiveFaq(activeFaq === idx ? null : idx)}
                                            className="w-full p-4 text-left font-semibold text-sm text-clinicalDark flex justify-between items-center hover:bg-gray-50 transition"
                                        >
                                            <span>{faq.q}</span>
