<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shreesh Physio Clinic | Advanced Clinical Rehabilitation & Care</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clinicalDark: '#0F2942',
                        clinicalBlue: '#2563EB',
                        clinicalLight: '#F0F7FF',
                        clinicalGreen: '#10B981',
                        clinicalSlate: '#64748B'
                    }
                }
            }
        }
    </script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E293B] antialiased">

    <div id="root"></div>

    <script type="text/babel">

            const [alertVisible, setAlertVisible] = useState(true);
            const [selectedDeliveryMode, setSelectedDeliveryMode] = useState('In-Clinic');
            const [activeFaq, setActiveFaq] = useState(null);
            const [showPortalModal, setShowPortalModal] = useState(false);
            
            // Booking Form States
            const [bookingStep, setBookingStep] = useState(1);
            const [selectedSpecialty, setSelectedSpecialty] = useState('');
            const [selectedSlot, setSelectedSlot] = useState('');
            const [patientName, setPatientName] = useState('');
            const [patientPhone, setPatientPhone] = useState('');
            const [patientEmail, setPatientEmail] = useState('');
            const [showSuccessModal, setShowSuccessModal] = useState(false);

            // Mock Portal State
            const [portalEmail, setPortalEmail] = useState('');
            const [portalPassword, setPortalPassword] = useState('');
            const [portalError, setPortalError] = useState('');

            // Data
            const specialties = [
                {
                    id: 'post-op',
                    title: 'Post-Operative Rehabilitation',
                    description: 'Structured mobilization protocols for Total Knee Replacement (TKR), shoulder rotator cuff tears, and surgical hardware recoveries.',
                    icon: (
                        <svg className="w-6 h-6 text-clinicalBlue" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                        </svg>
                    ),
                    tags: ['TKR Protocol', 'Suture Care Safe', 'ROM Recovery']
                },
                {
                    id: 'sports',
                    title: 'Sports & Repetitive Strain',
                    description: 'Targeted care plans focused on restoring tissue load capacity for ACL reconstruction, meniscus tears, and tennis elbow.',
                    icon: (
                        <svg className="w-6 h-6 text-clinicalBlue" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    ),
                    tags: ['ACL Strength', 'Load Progression', 'Kinematic Drills']
                },
                {
                    id: 'chronic',
                    title: 'Chronic Pain Management',
                    description: 'Scientifically validated modalities and customized load-bearing exercises for Arthritis, Plantar Fasciitis, and Spondylosis.',
                    icon: (
                        <svg className="w-6 h-6 text-clinicalBlue" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                        </svg>
                    ),
                    tags: ['Spine Alignment', 'Decompression', 'Myofascial Release']
                },
                {
                    id: 'special',
                    title: 'Specialized Clinical Programs',
                    description: 'Therapeutic weight management coordination and highly protective geriatric mobility maintenance programs.',
                    icon: (
                        <svg className="w-6 h-6 text-clinicalBlue" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z" />
                        </svg>
                    ),
                    tags: ['Senior Strength', 'Weight Management', 'Fall Prevention']
                }
            ];

            const timeSlots = [
                "10:00 AM - 11:00 AM",
                "11:00 AM - 12:00 PM",
                "12:00 PM - 01:00 PM",
                "06:00 PM - 07:00 PM",
                "07:00 PM - 08:00 PM",
                "08:00 PM - 09:00 PM"
            ];

            const testimonials = [
                {
                    name: "Mx. Curiee",
                    relation: "Daughter of Post-Op Patient",
                    text: "Taken post operative physiotherapy session for my father for TKR... my father is normal doing all his activities after 1 month.",
                    rating: 5
                },
                {
                    name: "Siripuram Rakesh",
                    relation: "Chronic Pain Patient",
                    text: "Suffering from Arthritis and plantar fascitis... her treatment has cured my problem and now I'm able to do my work smoothly.",
                    rating: 5
                },
                {
                    name: "Madhusudhan Edulakanti",
                    relation: "Sports Injury Patient",
                    text: "Referred for my tennis elbow... Took about 15 sessions. Now I'm back to my 90% mobility. Extremely disciplined regimen.",
                    rating: 5
                },
                {
                    name: "Namrata",
                    relation: "Local Guide",
                    text: "Extremely professional and well suited for senior citizens. Had taken multiple sessions for my mother... Very patient hearing.",
                    rating: 5
                }
            ];

            const faqs = [
                {
                    q: "Do you offer home visits?",
                    a: "Yes, we provide home rehabilitation services for patients with limited mobility or severe post-surgical recovery needs in Kapra and surrounding areas of Secunderabad."
                },
                {
                    q: "How long does a typical session last?",
                    a: "Most clinical sessions range from 45 to 60 minutes. This includes ongoing physical evaluations, active hands-on therapy, and structured, supervised exercises."
                },
                {
                    q: "What should I wear to my appointment?",
                    a: "We recommend loose, highly flexible, or athletic clothing that allows complete freedom of motion and allows direct assessment access to the joint being treated."
                }
            ];

            // Submit Booking logic
            const handleBookingSubmit = (e) => {
                e.preventDefault();
                if (!selectedSpecialty || !selectedSlot || !patientName || !patientPhone) {
                    alert("Please fill out all mandatory fields.");
                    return;
                }
                setShowSuccessModal(true);
            };

            const handlePortalLogin = (e) => {
                e.preventDefault();
                if(!portalEmail || !portalPassword) {
                    setPortalError("Please enter both credentials.");
                } else {
                    setPortalError("Registration portal offline. Only scheduled patients can gain secure dashboard entry.");
                }
            };

            const resetBooking = () => {
                setBookingStep(1);
                setSelectedSpecialty('');
                setSelectedSlot('');
                setPatientName('');
                setPatientPhone('');
                setPatientEmail('');
                setShowSuccessModal(false);
            };

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    
                    {/* 1. Emergency Alert Bar */}
                    {alertVisible && (
                        <div className="bg-clinicalDark text-white px-4 py-3 text-xs md:text-sm font-medium transition duration-300 relative">
                            <div className="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-2 pr-10">
                                <div className="flex items-center gap-2">
                                    <span className="bg-clinicalGreen text-clinicalDark text-[10px] font-bold uppercase px-2 py-0.5 rounded tracking-wide">Update</span>
                                    <span>Now offering highly specialized, clinical Home-Visit services in Kapra & Secunderabad.</span>
                                </div>
                                <a href="#booking" className="underline hover:text-clinicalLight text-xs font-semibold whitespace-nowrap">Schedule Home Visit &rarr;</a>
                            </div>
                            <button 
                                onClick={() => setAlertVisible(false)} 
                                className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white p-1"
                                aria-label="Close Alert"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                            </button>
                        </div>
                    )}

                    {/* Navigation Header */}
                    <header className="sticky top-0 bg-white/95 backdrop-blur-md shadow-sm z-40 border-b border-gray-100 transition-all">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            
                            {/* Clinic Branding */}
                            <a href="#" className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-clinicalLight border border-blue-100 flex items-center justify-center text-clinicalBlue">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold text-clinicalDark tracking-tight leading-none">Shreesh Physio</h1>
                                    <span className="text-[11px] text-clinicalGreen font-semibold tracking-wider uppercase">Clinical Excellence</span>
                                </div>
                            </a>

                            {/* Desktop Nav */}
                            <nav className="hidden md:flex items-center gap-8">
                                <a href="#specialties" className="text-sm font-semibold text-[#475569] hover:text-clinicalBlue transition">Specialties</a>
                                <a href="#doctor" className="text-sm font-semibold text-[#475569] hover:text-clinicalBlue transition">About Dr. Swetha</a>
                                <a href="#testimonials" className="text-sm font-semibold text-[#475569] hover:text-clinicalBlue transition">Testimonials</a>
                                <a href="#location" className="text-sm font-semibold text-[#475569] hover:text-clinicalBlue transition">Location</a>
                                <a href="#faqs" className="text-sm font-semibold text-[#475569] hover:text-clinicalBlue transition">FAQs</a>
                            </nav>

                            {/* CTA Action */}
                            <div className="flex items-center gap-4">
                                <button 
                                    onClick={() => setShowPortalModal(true)}
                                    className="hidden sm:inline-flex items-center gap-2 text-xs font-bold text-[#475569] border border-gray-200 hover:border-clinicalBlue hover:text-clinicalBlue transition px-4 py-2.5 rounded-lg"
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                                    Patient Portal
                                </button>
                                <a 
                                    href="#booking" 
                                    className="inline-flex items-center justify-center bg-clinicalBlue hover:bg-blue-700 text-white text-xs md:text-sm font-bold px-5 py-2.5 rounded-lg shadow-sm hover:shadow transition min-h-[48px]"
                                >
                                    Book Visit
                                </a>
                            </div>

                        </div>
                    </header>

                    {/* 2. Hero Section */}
                    <section className="relative overflow-hidden bg-gradient-to-b from-[#F0F7FF] via-white to-transparent py-16 md:py-24">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                            <div className="text-center max-w-3xl mx-auto">
                                
                                {/* Trust Pill */}
                                <div className="inline-flex items-center gap-2 bg-white px-3.5 py-1.5 rounded-full border border-blue-100/80 shadow-sm mb-6">
                                    <span className="flex items-center text-yellow-500 gap-1">
                                        <svg className="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                        <span className="text-xs font-bold text-clinicalDark">5.0/5.0</span>
                                    </span>
                                    <span className="w-1 h-1 rounded-full bg-gray-300"></span>
                                    <span className="text-xs font-semibold text-[#475569]">60+ Verified Patient Reviews</span>
                                </div>

                                <h2 className="text-4xl md:text-5xl lg:text-6xl font-extrabold text-clinicalDark tracking-tight leading-tight">
                                    Your Mobility, <br />
                                    <span className="text-clinicalBlue">Our Life's Work.</span>
                                </h2>

                                <p className="mt-6 text-base md:text-lg text-clinicalSlate leading-relaxed">
                                    Evidence-based, highly personalized physiotherapy recovering your functional strength, joint mechanics, and daily mobility with expert compassionate guidelines.
                                </p>

                                {/* Action Buttons */}
                                <div className="mt-10 flex flex-col sm:flex-row items-center justify-center gap-4">
                                    <a 
                                        href="#booking" 
                                        className="w-full sm:w-auto inline-flex items-center justify-center bg-clinicalBlue hover:bg-blue-700 text-white font-bold px-8 py-4 rounded-xl shadow-md hover:shadow-lg transition text-base min-h-[48px]"
                                    >
                                        Book Clinical Appointment
                                    </a>
                                    <a 
                                        href="#specialties" 
                                        className="w-full sm:w-auto inline-flex items-center justify-center bg-white hover:bg-gray-50 border border-gray-200 text-clinicalDark font-bold px-8 py-4 rounded-xl shadow-sm transition text-base min-h-[48px]"
                                    >
                                        Find a Specialty
                                    </a>
                                </div>

                            </div>
                        </div>
                    </section>

                    {/* 3. Specialty Directory */}
                    <section id="specialties" className="py-20 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            
                            <div className="text-center max-w-3xl mx-auto mb-12">
                                <span className="text-xs font-bold text-clinicalBlue uppercase tracking-wider bg-clinicalLight px-3.5 py-1.5 rounded-full">Clinical Scope</span>
                                <h2 className="text-3xl md:text-4xl font-extrabold text-clinicalDark mt-4">Physiotherapy Directories</h2>
                                <p className="text-clinicalSlate mt-2">Every pathology requires distinct mechanics. Select your service delivery modality to view care options.</p>
                            </div>

                            {/* Modality Toggles */}
                            <div className="flex justify-center mb-12">
                                <div className="inline-flex p-1 bg-[#F1F5F9] rounded-xl border border-gray-200">
                                    {['In-Clinic', 'Home Visits', 'Remote Coordination'].map((mode) => (
                                        <button
                                            key={mode}
                                            onClick={() => setSelectedDeliveryMode(mode)}
                                            className={`px-4 py-2.5 rounded-lg text-xs md:text-sm font-bold transition duration-200 ${selectedDeliveryMode === mode ? 'bg-white text-clinicalDark shadow-sm border border-gray-100' : 'text-clinicalSlate hover:text-clinicalDark'}`}
                                        >
                                            {mode}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Specialty Cards Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {specialties.map((specialty) => (
                                    <div key={specialty.id} className="bg-white rounded-2xl border border-gray-100 hover:border-blue-100 shadow-sm p-6 md:p-8 transition-all hover:shadow-md flex flex-col justify-between">
                                        <div>
                                            <div className="flex items-center gap-4 mb-4">
                                                <div className="w-12 h-12 rounded-xl bg-clinicalLight flex items-center justify-center">
                                                    {specialty.icon}
                                                </div>
                                                <h3 className="text-lg font-bold text-clinicalDark leading-snug">{specialty.title}</h3>
                                            </div>
                                            <p className="text-sm text-clinicalSlate leading-relaxed mb-6">{specialty.description}</p>
                                        </div>
                                        <div>
                                            <div className="flex flex-wrap gap-2 pt-4 border-t border-gray-100">
                                                {specialty.tags.map((tag, idx) => (
                                                    <span key={idx} className="bg-[#F8FAFC] text-[#475569] text-[11px] font-semibold px-2.5 py-1 rounded">
                                                        {tag}
                                                    </span>
                                                ))}
                                            </div>
                                            <div className="mt-4 text-xs font-semibold text-clinicalGreen flex items-center gap-1.5">
                                                <span className="w-2 h-2 rounded-full bg-clinicalGreen animate-pulse"></span>
                                                Active & Supported for {selectedDeliveryMode}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                        </div>
                    </section>

                    {/* 4. Provider Biography & Trust Badges */}
                    <section id="doctor" className="py-20 bg-gradient-to-b from-white to-[#F8FAFC]">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="bg-clinicalDark text-white rounded-3xl overflow-hidden shadow-xl lg:flex items-stretch">
                                
                                <div className="p-8 md:p-12 lg:p-16 flex-1 flex flex-col justify-between">
                                    <div>
                                        <div className="inline-flex items-center gap-2 bg-white/10 px-3.5 py-1.5 rounded-full mb-6">
                                            <span className="w-2 h-2 rounded-full bg-clinicalGreen"></span>
                                            <span className="text-xs font-bold tracking-wide uppercase">Chief Physiotherapist</span>
                                        </div>
                                        <h2 className="text-3xl md:text-4xl font-extrabold tracking-tight">Dr. K. Swetha Sri</h2>
                                        <span className="text-clinicalGreen text-sm font-semibold tracking-wider block mt-2">B.P.T, Professional Clinical Practice & Rehabilitation Specialist</span>
                                        
                                        <p className="mt-6 text-sm md:text-base text-blue-100 leading-relaxed max-w-2xl">
                                            Recognized for extreme patience, gentle surgical mobilization care, and deep clinical empathy. Dr. Swetha specializes in post-operative knee reconstructions, elderly gait analysis, athletic strain management, and posture alignment.
                                        </p>

                                        <blockquote className="mt-6 border-l-2 border-clinicalGreen pl-4 italic text-sm text-gray-300">
                                            "Our aim is not merely to treat physical pain, but to systematically build back functional capacity so you can move without mental hesitation."
                                        </blockquote>
                                    </div>

                                    {/* Trust Badges Container */}
                                    <div className="mt-10 pt-8 border-t border-white/10 grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        {[
                                            { title: "HIPAA Compliant", desc: "Data Encrypted Safely" },
                                            { title: "ISO 9001:2015", desc: "Quality Certified Services" },
                                            { title: "NABH Standards", desc: "Accredited Care Pathways" }
                                        ].map((badge, idx) => (
                                            <div key={idx} className="bg-white/5 rounded-xl p-3 border border-white/10 text-center sm:text-left">
                                                <h4 className="text-xs font-bold text-white">{badge.title}</h4>
                                                <p className="text-[10px] text-gray-400 mt-0.5">{badge.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                            </div>
                        </div>
                    </section>

                    {/* 5. Interactive Patient Booking Engine */}
                    <section id="booking" className="py-20 bg-white">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden">
                                
                                {/* Step Indicators Header */}
                                <div className="bg-[#F8FAFC] border-b border-gray-100 p-6 flex items-center justify-between">
                                    <div>
                                        <h3 className="text-lg font-bold text-clinicalDark">Interactive Care Booking</h3>
                                        <p className="text-xs text-clinicalSlate">Secure your preferred treatment session instantly</p>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className={`w-7 h-7 rounded-full text-xs font-bold flex items-center justify-center transition-all ${bookingStep >= 1 ? 'bg-clinicalBlue text-white' : 'bg-gray-200 text-gray-500'}`}>1</span>
                                        <span className="w-6 h-0.5 bg-gray-200"></span>
                                        <span className={`w-7 h-7 rounded-full text-xs font-bold flex items-center justify-center transition-all ${bookingStep >= 2 ? 'bg-clinicalBlue text-white' : 'bg-gray-200 text-gray-500'}`}>2</span>
                                    </div>
                                </div>

                                <div className="p-8">
                                    <form onSubmit={handleBookingSubmit}>
                                        
                                        {/* Step 1: Specialty & Slots */}
                                        {bookingStep === 1 && (
                                            <div className="space-y-6">
                                                <div>
                                                    <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-2.5">Select Treatment Track *</label>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                        {specialties.map((spec) => (
                                                            <button
                                                                type="button"
                                                                key={spec.id}
                                                                onClick={() => setSelectedSpecialty(spec.title)}
                                                                className={`p-4 rounded-xl border text-left transition duration-200 flex flex-col justify-between ${selectedSpecialty === spec.title ? 'border-clinicalBlue bg-clinicalLight shadow-sm ring-2 ring-clinicalBlue/10' : 'border-gray-200 hover:border-gray-300'}`}
                                                            >
                                                                <span className="text-sm font-bold text-clinicalDark block">{spec.title}</span>
                                                                <span className="text-[11px] text-clinicalSlate mt-1">Duration: 45 - 60 minutes</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-2.5">Available Slots (Mon-Sat) *</label>
                                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                                        {timeSlots.map((slot) => (
                                                            <button
                                                                type="button"
                                                                key={slot}
                                                                onClick={() => setSelectedSlot(slot)}
                                                                className={`py-2.5 px-3 rounded-lg text-xs font-semibold text-center border transition-all ${selectedSlot === slot ? 'bg-clinicalBlue text-white border-clinicalBlue' : 'border-gray-200 hover:border-gray-300 text-clinicalDark'}`}
                                                            >
                                                                {slot}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="pt-4 border-t border-gray-100 flex justify-end">
                                                    <button
                                                        type="button"
                                                        onClick={() => {
                                                            if(!selectedSpecialty || !selectedSlot) {
                                                                alert("Please pick both a clinical program and a time slot.");
                                                                return;
                                                            }
                                                            setBookingStep(2);
                                                        }}
                                                        className="bg-clinicalDark hover:bg-black text-white text-sm font-bold px-6 py-3 rounded-xl shadow-sm transition min-h-[48px] flex items-center gap-2"
                                                    >
                                                        Next: Patient Details
                                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg>
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        {/* Step 2: Contact Details */}
                                        {bookingStep === 2 && (
                                            <div className="space-y-6">
                                                
                                                <div className="bg-clinicalLight border border-blue-100/60 rounded-xl p-4 flex gap-3 items-start mb-6">
                                                    <svg className="w-5 h-5 text-clinicalBlue flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                    <div>
                                                        <span className="text-xs font-bold text-clinicalDark block">Selected Consultation:</span>
                                                        <p className="text-xs text-clinicalSlate mt-1">{selectedSpecialty} &bull; {selectedSlot}</p>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-2">Full Patient Name *</label>
                                                        <input
                                                            type="text"
                                                            required
                                                            placeholder="e.g., Rajesh Kumar"
                                                            value={patientName}
                                                            onChange={(e) => setPatientName(e.target.value)}
                                                            className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-clinicalBlue/20 focus:border-clinicalBlue text-sm transition"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-2">Mobile Phone *</label>
                                                        <input
                                                            type="tel"
                                                            required
                                                            placeholder="e.g., +91 99669 96940"
                                                            value={patientPhone}
                                                            onChange={(e) => setPatientPhone(e.target.value)}
                                                            className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-clinicalBlue/20 focus:border-clinicalBlue text-sm transition"
                                                        />
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-2">Email Address (Optional)</label>
                                                    <input
                                                        type="email"
                                                        placeholder="e.g., mail@patient.com"
                                                        value={patientEmail}
                                                        onChange={(e) => setPatientEmail(e.target.value)}
                                                        className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-clinicalBlue/20 focus:border-clinicalBlue text-sm transition"
                                                    />
                                                </div>

                                                <div className="pt-4 border-t border-gray-100 flex items-center justify-between">
                                                    <button
                                                        type="button"
                                                        onClick={() => setBookingStep(1)}
                                                        className="text-sm font-bold text-clinicalSlate hover:text-clinicalDark px-4 py-2"
                                                    >
                                                        Back to Slots
                                                    </button>
                                                    <button
                                                        type="submit"
                                                        className="bg-clinicalGreen hover:bg-emerald-600 text-white text-sm font-bold px-8 py-3.5 rounded-xl shadow-md transition min-h-[48px]"
                                                    >
                                                        Confirm & Book Appointment
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 6. Real Patient Testimonials */}
                    <section id="testimonials" className="py-20 bg-[#F8FAFC]">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            
                            <div className="text-center max-w-3xl mx-auto mb-12">
                                <span className="text-xs font-bold text-clinicalBlue uppercase tracking-wider bg-clinicalLight px-3.5 py-1.5 rounded-full font-semibold">Social Proof</span>
                                <h2 className="text-3xl md:text-4xl font-extrabold text-clinicalDark mt-4">Clinical Case Reviews</h2>
                                <p className="text-clinicalSlate mt-2">Verified results and timelines straight from our patient recovery files.</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {testimonials.map((test, index) => (
                                    <div key={index} className="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-gray-100 flex flex-col justify-between">
                                        <div>
                                            <div className="flex items-center text-yellow-500 gap-1 mb-4">
                                                {[...Array(test.rating)].map((_, i) => (
                                                    <svg key={i} className="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                                ))}
                                            </div>
                                            <p className="text-[#334155] text-sm md:text-base leading-relaxed italic">"{test.text}"</p>
                                        </div>
                                        <div className="mt-6 pt-4 border-t border-gray-100">
                                            <span className="text-sm font-extrabold text-clinicalDark block">{test.name}</span>
                                            <span className="text-xs text-clinicalSlate">{test.relation}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                        </div>
                    </section>

                    {/* 7. Multi-Location Directory & Contacts */}
                    <section id="location" className="py-20 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                
                                <div className="space-y-6">
                                    <span className="text-xs font-bold text-clinicalBlue uppercase tracking-wider bg-clinicalLight px-3.5 py-1.5 rounded-full font-semibold">Our Clinic Location</span>
                                    <h2 className="text-3xl md:text-4xl font-extrabold text-clinicalDark">Kapra Rehabilitation Center</h2>
                                    <p className="text-clinicalSlate leading-relaxed">
                                        We are strategically situated in the heart of Secunderabad, fully accessible for individuals with wheel-chairs, walking supports, and restricted physical mobility.
                                    </p>

                                    <div className="space-y-4">
                                        <div className="flex gap-4">
                                            <div className="w-10 h-10 rounded-lg bg-clinicalLight flex items-center justify-center text-clinicalBlue shrink-0">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                            </div>
                                            <div>
                                                <h4 className="text-xs font-bold uppercase tracking-wider text-clinicalDark">Clinic Address</h4>
                                                <p className="text-sm text-[#475569] mt-1">Opposite Aster Pharmacy, Goudapuri Colony, Ramdas Nagar Colony, Kapra, Secunderabad, Telangana 500103.</p>
                                            </div>
                                        </div>

                                        <div className="flex gap-4">
                                            <div className="w-10 h-10 rounded-lg bg-clinicalLight flex items-center justify-center text-clinicalBlue shrink-0">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                            </div>
                                            <div>
                                                <h4 className="text-xs font-bold uppercase tracking-wider text-clinicalDark">Immediate Contact Helpline</h4>
                                                <p className="text-sm text-[#475569] mt-1 font-semibold">+91 99669 96940</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Mock Map Interface */}
                                <div className="bg-[#F1F5F9] rounded-3xl overflow-hidden min-h-[350px] border border-gray-200 flex flex-col items-center justify-center relative p-8 text-center">
                                    <div className="absolute inset-0 opacity-10 bg-[radial-gradient(#000_1px,transparent_1px)] [background-size:16px_16px]"></div>
                                    <div className="w-16 h-16 rounded-full bg-clinicalBlue text-white flex items-center justify-center shadow-md animate-bounce mb-4 relative z-10">
                                        <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                    </div>
                                    <h4 className="font-bold text-clinicalDark relative z-10 text-lg">Opposite Aster Pharmacy</h4>
                                    <p className="text-xs text-clinicalSlate max-w-sm mt-1 relative z-10">Goudapuri Colony, Ramdas Nagar Colony, Kapra</p>
                                    <a 
                                        href="https://maps.google.com/?q=Shreesh+Physio+Clinic+Kapra" 
                                        target="_blank" 
                                        className="mt-6 bg-white hover:bg-gray-50 border border-gray-200 text-clinicalDark font-semibold text-xs px-6 py-3 rounded-xl shadow-sm transition relative z-10 inline-flex items-center gap-2"
                                    >
                                        Open in Google Maps
                                    </a>
                                </div>

                            </div>
                        </div>
                    </section>

                    {/* 8. FAQ Accordion */}
                    <section id="faqs" className="py-20 bg-[#F8FAFC] border-t border-gray-100">
                        <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                            
                            <div className="text-center mb-12">
                                <span className="text-xs font-bold text-clinicalBlue uppercase tracking-wider bg-clinicalLight px-3.5 py-1.5 rounded-full font-semibold">Faq</span>
                                <h2 className="text-3xl font-extrabold text-clinicalDark mt-4">Questions Frequently Asked</h2>
                            </div>

                            <div className="space-y-4">
                                {faqs.map((faq, idx) => (
                                    <div key={idx} className="bg-white rounded-xl border border-gray-100 overflow-hidden transition duration-200 shadow-sm">
                                        <button 
                                            onClick={() => setActiveFaq(activeFaq === idx ? null : idx)}
                                            className="w-full px-6 py-5 text-left font-bold text-clinicalDark text-sm sm:text-base flex items-center justify-between gap-4"
                                        >
                                            <span>{faq.q}</span>
                                            <span className={`text-clinicalBlue transition-transform duration-200 ${activeFaq === idx ? 'rotate-180' : ''}`}>
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                                            </span>
                                        </button>
                                        {activeFaq === idx && (
                                            <div className="px-6 pb-5 text-sm text-clinicalSlate border-t border-gray-50 pt-3 leading-relaxed">
                                                {faq.a}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-clinicalDark text-[#94A3B8] border-t border-white/10 py-12">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center justify-between gap-6">
                            <div>
                                <h3 className="text-white font-bold text-base">Shreesh Physio Clinic</h3>
                                <p className="text-xs text-gray-400 mt-1">&copy; 2026 Shreesh Physio. Private & Clinical Rights Reserved.</p>
                            </div>
                            <div className="flex gap-6 text-xs">
                                <a href="#specialties" className="hover:text-white transition">Specialties</a>
                                <a href="#doctor" className="hover:text-white transition">About</a>
                                <a href="#testimonials" className="hover:text-white transition">Reviews</a>
                                <a href="#location" className="hover:text-white transition">Contact</a>
                            </div>
                        </div>
                    </footer>

                    {/* Modals Section */}

                    {/* Booking Success Modal */}
                    {showSuccessModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl border border-gray-100 text-center animate-in fade-in zoom-in duration-200">
                                <div className="w-16 h-16 rounded-full bg-emerald-50 border border-emerald-100 flex items-center justify-center text-clinicalGreen mx-auto mb-6">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>
                                </div>
                                <h4 className="text-xl font-extrabold text-clinicalDark">Appointment Saved!</h4>
                                <p className="text-sm text-clinicalSlate mt-2">
                                    Your physical restoration session with Dr. K. Swetha Sri has been tentatively reserved.
                                </p>

                                <div className="bg-[#F8FAFC] border border-gray-100 rounded-2xl p-4 my-6 text-left space-y-2">
                                    <div className="text-xs"><span className="text-clinicalSlate">Patient:</span> <strong className="text-clinicalDark">{patientName}</strong></div>
                                    <div className="text-xs"><span className="text-clinicalSlate">Track:</span> <strong className="text-clinicalDark">{selectedSpecialty}</strong></div>
                                    <div className="text-xs"><span className="text-clinicalSlate">Time Slot:</span> <strong className="text-clinicalDark">{selectedSlot}</strong></div>
                                    <div className="text-xs"><span className="text-clinicalSlate">Location:</span> <strong className="text-clinicalDark">Kapra Branch (Opp. Aster)</strong></div>
                                </div>

                                <button 
                                    onClick={resetBooking}
                                    className="w-full bg-clinicalDark hover:bg-black text-white text-sm font-bold py-3.5 rounded-xl transition"
                                >
                                    Dismiss & Close
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Patient Portal Modal */}
                    {showPortalModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl border border-gray-100 animate-in fade-in zoom-in duration-200 relative">
                                <button 
                                    onClick={() => { setShowPortalModal(false); setPortalError(''); }}
                                    className="absolute right-6 top-6 text-gray-400 hover:text-clinicalDark"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>

                                <div className="text-center mb-6">
                                    <div className="w-12 h-12 rounded-xl bg-clinicalLight border border-blue-100 flex items-center justify-center text-clinicalBlue mx-auto mb-3">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                                    </div>
                                    <h4 className="text-lg font-bold text-clinicalDark">Patient Portal Login</h4>
                                    <p className="text-xs text-clinicalSlate">Access secure health records & rehab timelines</p>
                                </div>

                                <form onSubmit={handlePortalLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-2">Registered Email</label>
                                        <input 
                                            type="email" 
                                            required
                                            value={portalEmail}
                                            onChange={(e) => setPortalEmail(e.target.value)}
                                            placeholder="yourname@domain.com"
                                            className="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-clinicalBlue/20"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wider text-clinicalDark mb-2">Password</label>
                                        <input 
                                            type="password" 
                                            required
                                            value={portalPassword}
                                            onChange={(e) => setPortalPassword(e.target.value)}
                                            placeholder="••••••••"
                                            className="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-clinicalBlue/20"
                                        />
                                    </div>

                                    {portalError && (
                                        <div className="text-xs font-semibold text-rose-500 bg-rose-50 border border-rose-100 p-3 rounded-lg text-center">
                                            {portalError}
                                        </div>
                                    )}

                                    <button 
                                        type="submit"
                                        className="w-full bg-clinicalBlue hover:bg-blue-700 text-white text-sm font-bold py-3.5 rounded-xl transition mt-2"
                                    >
                                        Sign In securely
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
